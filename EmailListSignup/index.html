<!doctype html>
<html lang="en-US">
<head>
  <title>The Tired Hippy Co - Email Signup</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Join The Tired Hippy Co Email List to hear about New Products, Upcoming Events, Sales, and Company Updates!">
  <link rel="canonical" href="https://thetiredhippy.com/EmailListSignup/">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="../styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Aladin&display=swap" rel="stylesheet">
</head>

<body>
<h1 class="sr-only">Join The Tired Hippy Co Email List</h1>
<header class="topbar">
  <a href="/">
    <img src="../banner.png" class="banner" alt="The Tired Hippy Co">
  </a>
</header>

<nav>
  <a href="/">Home</a>
  <a href="../NewsAndSales/">News, Drops & Sales</a>
  <a href="../FindMeAtTheseEvents/">Live Events</a>
  <a href="../EmailListSignup/" class="active">Email List Signup</a>
</nav>

<div class="container">

  <div class="card">

    <h2>Join The Email List</h2>
    <p>Get updates on Drops, Events, and Sales.</p>

    <form id="signup-form"
          action="https://script.google.com/macros/s/AKfycbze3xD0xzSEBMKct4XJ6_CKUEK4AqxuhUtzKgEDxBs36CtFA2oEYLS4MdWdKDhnwLhydA/exec"
          method="POST">

      <input type="text" name="name" placeholder="Preferred Name" required>
      <br>

      <input type="email" name="email" placeholder="Email" required>
      <br>

      <input type="text" name="city" placeholder="City (optional)">
      <br><br>

      <input type="text" name="website" style="display:none">

      <button type="submit">Submit!</button>

    </form>

    <p id="status" style="display:none; font-weight:bold;"></p>

  </div>

</div>

<script>
  const form = document.getElementById("signup-form");
  const status = document.getElementById("status");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    status.style.display = "block";
    status.style.color = "black";
    status.textContent = "Submitting...";

    const formData = new FormData(form);

    try {
      const res = await fetch(form.action, {
        method: "POST",
        body: formData
      });

      if (res.ok) {
        status.style.color = "green";
        status.textContent = "Thanks! You’re on the list.";
        form.reset();
      } else {
        status.style.color = "red";
        status.textContent = "Something went wrong. Try again.";
      }

    } catch (err) {
      status.style.color = "red";
      status.textContent = "Network error. Try again.";
    }
  });
</script>

<footer class="footer">
  <div class="footer-left">
    <p>The Tired Hippy Co™</p>
    <p>All artwork and logos protected © 2025–2026</p>
  </div>

  <div class="footer-right">
    <a href="mailto:business@thetiredhippy.com?subject=Business%20Inquiry%20-%20The%20Tired%20Hippy%20Co">
      Contact (Email)
    </a>
  </div>
</footer>

</body>
</html>
